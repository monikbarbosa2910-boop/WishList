<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Wishlist</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#5b3df5,#8b5cf6,#a855f7);
margin:0;
padding:30px;
text-align:center;
color:white;
}

h1{
margin-bottom:25px;
}

.input-area{
margin-bottom:30px;
}

input{
width:300px;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:white;
color:#6b21a8;
font-weight:bold;
cursor:pointer;
margin-left:5px;
}

button:hover{
opacity:0.9;
}

#produtos{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
justify-content:center;
}

.card{
background:white;
color:black;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h4{
padding:10px;
font-size:14px;
min-height:40px;
}

.card a{
margin:10px;
padding:10px;
background:#7c3aed;
color:white;
text-decoration:none;
border-radius:8px;
}

.remover{
margin:10px;
background:#ef4444;
color:white;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>⭐ Minha Wishlist</h1>

<div class="input-area">
<input id="link" placeholder="Cole o link do produto">
<button onclick="buscarProduto()">Adicionar</button>
</div>

<div id="produtos"></div>

<script>

let lista = JSON.parse(localStorage.getItem("wishlist")) || [];

function salvar(){
localStorage.setItem("wishlist", JSON.stringify(lista));
}

function criarCard(produto,index){

let card = document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${produto.imagem}">
<h4>${produto.titulo}</h4>

<a href="${produto.link}" target="_blank">
Ver produto
</a>

<button class="remover">
Remover
</button>

`;

card.querySelector(".remover").onclick=()=>{
lista.splice(index,1);
salvar();
renderizar();
};

document.getElementById("produtos").appendChild(card);

}

function renderizar(){

document.getElementById("produtos").innerHTML="";

lista.forEach((produto,index)=>{
criarCard(produto,index);
});

}

async function buscarProduto(){

let link=document.getElementById("link").value;

if(!link) return;

let api="https://api.microlink.io/?url="+encodeURIComponent(link);

try{

let resposta=await fetch(api);
let dados=await resposta.json();

let titulo=dados.data.title || "Produto";
let imagem=dados.data.image?.url || "https://via.placeholder.com/300";

let produto={
titulo:titulo,
imagem:imagem,
link:link
};

lista.push(produto);

salvar();
renderizar();

document.getElementById("link").value="";

}catch{

alert("Não foi possível carregar o produto.");

}

}

renderizar();

</script>

</body>
</html>
