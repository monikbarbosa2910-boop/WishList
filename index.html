<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Wishlist</title>

<link rel="icon" type="image/png" sizes="512x512" href="iconf.png.png">
<link rel="apple-touch-icon" href="iconf.png.png">

<style>

body{
font-family: Arial;
margin:0;
padding:30px;
text-align:center;
color:white;
background:linear-gradient(135deg,#4c1d95,#7c3aed,#a855f7);
}

input{
padding:12px;
border-radius:10px;
border:none;
margin:5px;
width:220px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:white;
color:#6b21a8;
font-weight:bold;
cursor:pointer;
}

#produtos{
column-count:3;
column-gap:20px;
max-width:1000px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
color:black;
border-radius:14px;
margin-bottom:20px;
display:inline-block;
width:100%;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.card img{
width:100%;
height:auto;
}

.card h4{
padding:10px;
}

.card a{
display:block;
margin:10px;
padding:10px;
background:#7c3aed;
color:white;
text-decoration:none;
border-radius:8px;
}

.remover{
margin:10px;
background:#ef4444;
color:white;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
}

@media(max-width:700px){
#produtos{
column-count:2;
}
}

@media(max-width:500px){
#produtos{
column-count:1;
}
}

</style>

</head>

<body>

<h1>⭐ Minha Wishlist</h1>

<div>

<input id="titulo" placeholder="Nome do produto">

<input type="file" id="imagem" accept="image/*">

<input id="link" placeholder="Link do produto">

<br>

<button onclick="adicionarProduto()">Adicionar</button>

</div>

<div id="produtos"></div>

<script>

let lista = JSON.parse(localStorage.getItem("wishlist")) || [];

function salvar(){
localStorage.setItem("wishlist", JSON.stringify(lista));
}

function renderizar(){

let area=document.getElementById("produtos");

area.innerHTML="";

lista.forEach((produto,index)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${produto.imagem}">

<h4>${produto.titulo}</h4>

<a href="${produto.link}" target="_blank">Ver produto</a>

<button class="remover">Remover</button>

`;

card.querySelector(".remover").onclick=()=>{
lista.splice(index,1);
salvar();
renderizar();
};

area.appendChild(card);

});

}

function adicionarProduto(){

let titulo=document.getElementById("titulo").value;
let link=document.getElementById("link").value;
let arquivo=document.getElementById("imagem").files[0];

if(!titulo || !link || !arquivo){
alert("Preencha todos os campos");
return;
}

let reader = new FileReader();

reader.onload=function(e){

lista.push({
titulo:titulo,
imagem:e.target.result,
link:link
});

salvar();
renderizar();

};

reader.readAsDataURL(arquivo);

}

renderizar();

</script>

</body>
</html>
